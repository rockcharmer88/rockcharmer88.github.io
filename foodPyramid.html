<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Pyramid</title>
<style>
 body {display: flex; justify-content: center;}
 table {border-collapse: collapse}
 table, th, td {border: thin solid black;}
 th, td {padding: 10px}
 thead th {
  background-color: #086838;
  color: white;
 }

tbody th {
  background-color: white;
  color: black;
  text-align: left;
}
td {
  background-color: white;
  text-align: center;
}
caption {
  font-size: 2em;
  margin-bottom: 10px;
}
</style>
</head> 

<body>
<table>
  <caption>USDA Food Pyramid</caption>
  <thead>
    <tr>
      <th></th>
      <th colspan="2">Serving Guidelines</th>
    </tr>
    <tr>
      <th>Food Group</th>
      <th>2005-2010</th>
      <th>2011-present</th>
    </tr>
  </thead>
  <tbody>
    <tr><th>Dairy<br>(milk, yogurt, cheese)</th><td>2-3</td><td>3-4</td></tr>
    <tr><th>Meat and Beans<br>(beef, poultry, fish, beans)</th><td>2-3</td><td>5-6</td></tr>
    <tr><th>Fruits</th><td>2-4</td><td>2-4</td></tr>
    <tr><th>Vegetables</th><td>3-5</td><td>1-2</td></tr>
    <tr><th>Grains<br>(bread, donuts, pop tarts)</th><td>1-2</td><td>3-5</td></tr>
</table>
</body>
</html>
