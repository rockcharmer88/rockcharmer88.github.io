<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Form</title>
<style>
 body {
  display: flex; 
  justify-content: left;
  font-family: 'Times New Roman', Times, serif;}
 table {border-collapse: collapse}
 table, th, td {
  border: 2px solid darkblue;
  text-align: left;
  }
 th, td {
    text-align: left;
    padding: 10px;
    border-bottom-width: medium;
    }
 td:nth-child(3), th:nth-child(3) {width: 120px}
 td:nth-child(4), th:nth-child(4) {width: 120px}
 td:nth-child(5), th:nth-child(5) {width: 120px}
caption {
  font-size: 2em;
  font-weight: bold;
  padding: 15px;
  color: rgb(91, 10, 91)
}
.solid td {
  background-color: black;
}
</style>
</head> 

<body>
<table>
  <caption>Customer Order Form</caption>
  <thead>
    <tr>
      <th colspan="5">Order Number</th>
    </tr>
    <tr>
      <th colspan="5">Order Date</th>
    </tr>
    <tr>
      <th colspan="2">Product Name</th>
      <th>Color</th>
      <th>Quantity</th>
      <th>Price</th>
    </tr>
  </thead>
  <tbody>
    <tr><td colspan="2"></td><td></td><td></td><td></td></tr>
    <tr><td colspan="2"></td><td></td><td></td><td></td></tr>
    <tr><td colspan="2"></td><td></td><td></td><td></td></tr>
    <tr><td colspan="2"></td><td></td><td></td><td></td></tr>
    <tr class="solid"><td colspan="5"></td></tr>
    <tr><td colspan="5">Subtotal</td></tr>
    <tr><td colspan="5">Tax</td></tr>
    <tr><td colspan="4">Shipping</td><td>5.95</td></tr>
    <tr><td colspan="5">Total</td></tr>
  </tbody>
</table>
</body>
</html>
