<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Form</title>
<style>
 body {display: flex; justify-content: center;}
 table {
  border-collapse: collapse
  text-align: left;
 }
 table, th, td {border: 2px solid darkblue;}
 th, td {padding: 10px}
 thead th {
  background-color: white;
 }

tbody th {
  background-color: white;
  color: black;
}
td {
  background-color: white;
}
caption {
  font-size: 2em;
  padding: 15px;
  color: rgb(91, 10, 91)
}
</style>
</head> 

<body>
<table>
  <caption>Customer Order Form</caption>
  <thead>
    <tr>
      <th colspan="5">Order Number</th>
    </tr>
    <tr>
      <th colspan="5">Order Date</th>
    </tr>
    <tr>
      <th colspan="2">Product Name</th>
      <th>Color</th>
      <th>Quantity</th>
      <th>Price</th>
    </tr>
  </thead>
  <tbody>
    <tr><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><th>Meat and Beans<br><em>(beef, poultry, fish, beans)</em></th><td>2-3</td><td>5-6</td></tr>
    <tr><th>Fruits</th><td>2-4</td><td>2-4</td></tr>
    <tr><th>Vegetables</th><td>3-5</td><td>1-2</td></tr>
    <tr><th>Grains<br><em>(bread, donuts, pop tarts)</em></th><td>1-2</td><td>3-5</td></tr>
    </tbody>
</table>
</body>
</html>
