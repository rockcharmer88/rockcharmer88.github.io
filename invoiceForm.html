<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="author" content="John Dean">
<title>Famous Speeches</title>

<style>

.grid {
    display: grid;
    grid-template-columns: 20% 10% 10% 10%;
    grid-template-rows: repeat(12, 3em);
}

.grid > header:first-of-type {
    grid-column: 1 / span 4;
    font-size: xx-large;
    color: rgb(100, 11, 100);
}

.grid > header:nth-of-type(n + 2) {
    font-size: x-large;
}

.order {
    grid-column: 1 / span 4;
}

.grid > * {
    padding: 8px;
    text-align: center;
}

.grid > *:nth-child(n + 2) {
    outline: 1px solid darkblue;
}

.grid > span {
    display: flex;
    align-items: left;
    justify-content: left;
}
.black {
    background-color: black;
    grid-column: 1 / span 4;
}
.shipping {
    grid-column: 1 / span 3;
}
.head {
    font-weight: bold;
}

</style>
</head> 

<body>
<div class="grid">
  <header>Customer Order Form</header>
  
  <span class="order">Order Number</span>
  <span class="order">Order Date</span>
  <span class="head">Product Name</span>
  <span class="head">Color</span>
  <span class="head">Quantity</span>
  <span class="head">Price</span>

  <span></span>
  <span></span>
  <span></span>
  <span></span>

  <span></span>
  <span></span>
  <span></span>
  <span></span>

  <span></span>
  <span></span>
  <span></span>
  <span></span>

  <span></span>
  <span></span>
  <span></span>
  <span></span>

  <span class="black"></span>
  <span class="order">Subtotal</span>
  <span class="order">Tax</span>
  <span class="shipping">Shipping</span>
  <span>5.95</span>
  <span class="order">Total</span>
</div>
</body>
</html>
