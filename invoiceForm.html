<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="author" content="John Dean">
<title>Famous Speeches</title>

<style>

.grid {
    display: inline-grid;
    grid-template-columns: repeat(4, auto);
}

.grid > header:first-of-type {
    grid-column: 1 / span 4;
    font-size: xx-large;
    color: blue;
}

.grid > header:nth-of-type(n + 2) {
    font-size: x-large;
    color: blue;
    background-color: moccasin;
}

.order {
    grid-row: 1 / span 4;
}

.grid > * {
    padding: 8px;
    text-align: center;
}

.grid > *:nth-child(n + 2) {
    outline: 1px solid green;
}

.grid > span {
    background-color: aliceblue;
    display: flex;
    align-items: center;
    justify-content: center;
}

</style>
</head> 

<body>
<div class="grid">
  <header>Customer Order Form</header>
  
  <span class="order">Order Number</span>
  <span>Order Date</span>
  <span>Product Name</span>
  <span>Color</span>
  <span>Quantity</span>
  <span>Price</span>

  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span>Subtotal</span>
  <span>Tax</span>
  <span>Shipping</span><span>5.95</span>
  <span>Total</span>
</div>
</body>
</html>
