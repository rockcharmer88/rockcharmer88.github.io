<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Form</title>
<style>
 body {display: flex; justify-content: left;}
 table {width: 50%; border-collapse: collapse}
 table, th, td {
  border: 2px solid darkblue;
  text-align: left;
  }
 th, td {padding: 10px}
caption {
  font-size: 2em;
  padding: 15px;
  color: rgb(91, 10, 91)
}
</style>
</head> 

<body>
<table>
  <caption>Customer Order Form</caption>
  <thead>
    <tr>
      <th colspan="5">Order Number</th>
    </tr>
    <tr>
      <th colspan="5">Order Date</th>
    </tr>
    <tr>
      <th colspan="2">Product Name</th>
      <th>Color</th>
      <th>Quantity</th>
      <th>Price</th>
    </tr>
  </thead>
  <tbody>
    <tr><td colspan="2"></td><td></td><td></td><td></td></tr>
    <tr><td colspan="2"></td><td></td><td></td><td></td></tr>
    <tr><td colspan="2"></td><td></td><td></td><td></td></tr>
    <tr><td colspan="2"></td><td></td><td></td><td></td></tr>
    <tr><td colspan="5"></td></tr>
    <tr><td colspan="5">Subtotal</td></tr>
    <tr><td colspan="5">Tax</td></tr>
    <tr><td colspan="4">Shipping</td><td>5.95</td></tr>
    <tr><td colspan="5">Total</td></tr>
  </tbody>
</table>
</body>
</html>
