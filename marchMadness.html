<!DOCTYPE html>

<head>

<title>March Madness</title>

<style>
body {
    display: flex;
    justify-content: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 350px);
    column-gap: none;
    grid-template-rows: 350px;
    row-gap: none;
  }
  .grid > header:first-of-type {
    font-size: 2em;
  }
  .grid > header {
    display: flex;
    flex-direction: column;
    outline: 1px solid black;
    text-align: center;
    justify-content: center;
  }
  caption {
    font-weight: bold;
    font-size: 2em;
    padding: 10px;
  }
  .calendar > header:first-of-type{
    font-size: 1.5em;
    font-weight: bold;
  }
  thead, tbody {
    font-size: 1.5em;
  }
  .days {
    grid-column: 1 / span 4;
}
</style>
</head>

<div class="grid">

        <tr>< td >28</ td >< td >29</ td >< td >30</ td >< td >31</ td >< td ></ td >< td ></ td >< td ></ td ></ tr >
