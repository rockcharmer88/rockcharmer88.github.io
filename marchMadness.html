<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="author" content="John Dean">
<title>March Madness</title>

<style>
body {
    display: flex;
    justify-content: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 500px);
    column-gap: none;
    grid-template-rows: 150 px auto;
    row-gap: none;
  }
  .grid > header:first-of-type {
    font-size: 2em;
    grid-template-rows: 3em;
  }
  .grid > * {
    outline: 1px solid black;
    text-align: center;
  }
</style>
</head> 

<body>
<div class="grid">
  <header>MARCH<br>MADNESS</header>
  <header>March Madness</header>
  <header>
    <p>
    <em>The Jayhawks</em><br>Hail to thee our alma mater, towering toward
    the blue. Lift the banner ever skyward, Hail to old KU.
    </p>
    </header>
</div>
</body>
</html>
