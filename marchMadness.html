<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="author" content="John Dean">
<title>March Madness</title>

<style>
body {
    display: flex;
    justify-content: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 350px);
    column-gap: none;
    grid-template-rows: 350px;
    row-gap: none;
  }
  .grid > header:first-of-type {
    font-size: 2em;
  }
  .grid > header {
    display: flex;
    flex-direction: column;
    outline: 1px solid black;
    text-align: center;
    justify-content: center;
  }
  caption {
    font-weight: bold;
    font-size: 2em;
    padding: 10px;
  }
  .calendar > header:first-of-type{
    font-size: 1.5em;
    font-weight: bold;
  }
  thead, tbody {
    font-size: 1.5em;
  }
  .days {
    grid-column: 1 / span 4;
}
</style>
</head> 

<body>
<div class="grid">
  <header>MARCH<br>MADNESS</header>
  <header>
    <div class="calendar">
      <header>March</header>
      <span>Sun</span>
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
        <tr><td></td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td></tr>
        <tr><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td><td>12</td><td>13</td></tr>
        <tr><td>14</td><td>15</td><td>16</td><td>17</td><td>18</td><td>19</td><td>20</td></tr>
        <tr><td>21</td><td>22</td><td>23</td><td>24</td><td>25</td><td>26</td><td>27</td></tr>
        <tr><td>28</td><td>29</td><td>30</td><td>31</td><td></td><td></td><td></td></tr>
      </tbody>
    </div>
  </body>
  </header>
  <header>
    <p>
    <strong>The Jayhawks</strong><br>Hail to thee our alma mater, towering toward
    the blue. Lift the banner ever skyward, Hail to old KU.
    </p>
    </header>
</div>
</body>
</html>
