<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="author" content="Brittany Best">
<title>March Madness</title>

<style>
body {
    display: flex;
    justify-content: center;
  }
  .grid {
    display: grid;
    grid-template-columns: 300px 350px 300px;
    column-gap: none;
    grid-template-rows: 200px;
    row-gap: none;
  }
  .grid > div:first-of-type {
    font-size: 3em;
    font-weight: bold;
  }
  .grid > div {
    display: flex;
    flex-direction: column;
    outline: 1px solid black;
    text-align: center;
    justify-content: center;
  }
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 7fr);
    width: 100%;
  }
  
  .calendar > h2:first-of-type{
    grid-column: 1 / span 7;
    font-size: 1.5em;
    font-weight: bold;
  }

  .calendar > span:nth-of-type(n+17){
    background:gold;
  }
  
  .grid > div:last-of-type {
    font-size: 1em;
  }
  .grid > div:nth-of-type(1), 
  .grid > div:nth-of-type(3) {
    padding: 20px;
  }
  h1 {
    font-size: 1.2em;
  }
</style>
</head> 
<body>
<header class="grid">
  <div>MARCH<br>MADNESS</div>
  <div class="calendar">
  <h2>March</h2>
    <span>Sun</span>
    <span>Mon</span>
    <span>Tue</span>
    <span>Wed</span>
    <span>Thu</span>
    <span>Fri</span>
    <span>Sat</span>
        
    <span></span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span>
    <span>7</span><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span><span>13</span>
    <span>14</span><span>15</span><span>16</span><span>17</span><span>18</span><span>19</span><span>20</span>
    <span>21</span><span>22</span><span>23</span><span>24</span><span>25</span><span>26</span><span>27</span>
    <span>28</span><span>29</span><span>30</span><span>31</span><span></span><span></span><span></span>
  </div>
  <div>
    <h1>The Jayhawks</h1> 
    <p>Hail to thee our alma mater, towering toward
    the blue. Lift the banner ever skyward, Hail to old KU.
    </p>
  </div>
</header>
</body>
</html>
