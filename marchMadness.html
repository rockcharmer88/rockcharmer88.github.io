<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="author" content="John Dean">
<title>March Madness</title>

<style>
body {
    display: flex;
    justify-content: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 350px);
    column-gap: none;
    grid-template-rows: 350px;
    row-gap: none;
  }
  .grid > header:first-of-type {
    font-size: 2em;
  }
  .grid > header {
    display: flex;
    flex-direction: column;
    outline: 1px solid black;
    text-align: center;
    justify-content: center;
  }
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 20%)
    width: 100%;
  }
  .calendar > header:first-of-type{
    grid-column: 1 / span 7;
    font-size: 1.5em;
    font-weight: bold;
  }
</style>
</head> 
<body>
<div class="grid">
  <header>MARCH<br>MADNESS</header>
  <header>
    <div class="calendar">
      <header>March</header>
      <span>Sun</span>
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
        
      <span></span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span>
      <span>7</span><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span><span>13</span>
      <span>14</span><span>15</span><span>16</span><span>17</span><span>18</span><span>19</span><span>20</span>
      <span>21</span><span>22</span><span>23</span><span>24</span><span>25</span><span>26</span><span>27</span>
      <span>28</span><span>29</span><span>30</span><span>31</span><span></span><span></span><span></span>
    </div>
  </header>
  <header>
    <p>
    <strong>The Jayhawks</strong><br>Hail to thee our alma mater, towering toward
    the blue. Lift the banner ever skyward, Hail to old KU.
    </p>
    </header>
</div>
</body>
</html>
