<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Brittany Best">
  <title>Hook & Learn</title>
  <link rel="stylesheet" href="styles.css">
  <script src="scripts.js"></script>
  <style>    
  header {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 6px solid black;
  }
  header img {
    height: 200px;
  }
  nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
    border: 6px solid black;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 0;
    grid-template-rows: 200px;
    row-gap: 0;
  }
  .grid > div {
    outline: 6px solid black;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .text {
    padding: 20px;
  }
  .grid > div:first-of-type {
    grid-column: 1 / span 2;
  }
  .grid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 6px solid black;
    margin-top: 20px; 
  }
  .dropbtn {
  background-color: #C97A7E;
  color: white;
  padding: 16px;
  font-size: 16px;
  border: none;
  font-family: inherit;
  cursor: pointer;
}

.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

/* Change color of dropdown links on hover */
.dropdown-content a:hover {background-color: #ddd;}

/* Show the dropdown menu on hover */
.dropdown:hover .dropdown-content {display: block;}

/* Change the background color of the dropdown button when the dropdown content is shown */
.dropdown:hover .dropbtn {background-color: #4c8f7f;}

.nav-link {
  display: inline-block;
  color: white;
  background-color: #04AA6D;
  padding: 16px;
  font-size: 16px;
  text-decoration: none;
  border: none;
}

.nav-link:hover {
  background-color: #3e8e41;
}
  </style>
  </head>
<body>
  <header>
      <img src="images/HookLearnLogo.png" alt="logo">
  </header>
  <nav>
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="whatIsCrochet.html">What is crochet?</a>
    <div class="dropdown">
      <button class="dropbtn">Tools</button>
        <div class="dropdown-content">
          <a href="#">Hooks</a>
          <a href="#">Yarn</a>
          <a href="#">Extras</a>
        </div>
    </div>
    <a class="nav-link" href="site.html">Getting Started</a>
    <div class="dropdown">
      <button class="dropbtn">Stitches</button>
        <div class="dropdown-content">
          <a href="#">Chain</a>
          <a href="#">Single Crochet</a>
          <a href="#">Double Crochet</a>
        </div>
    </div>
    <a class="nav-link" href="site.html">Beginner Projects</a>
  </nav>
  <main class="grid">
    <div class="text">Welcome to Hook & Learn!</div>
    <div class="text">Why you should learn to crochet!</div>
    <div>
     <img src="images/CrochetSupplies.png" alt="Crochet Supplies">
    </div>
  </main>
  <footer>
    <p>Hook & Learn © 2026  |  Created by Brittany Best  |  Email: crochet@hookandlearn.com</p>
  </footer>
</body>
</html>
